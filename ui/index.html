<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signet Control</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --border-glow: #f7931a33;
    --text: #e8e6e3;
    --text-dim: #8888a0;
    --btc: #f7931a;
    --btc-dim: #f7931a66;
    --green: #00d26a;
    --red: #ff4757;
    --blue: #4a9eff;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Subtle grid background ─────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.08;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 24px 20px; }

  /* ── Header ─────────────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .header h1 {
    font-family: var(--sans);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .header h1 span { color: var(--btc); }
  .header .links a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 12px;
    margin-left: 16px;
    transition: color 0.2s;
  }
  .header .links a:hover { color: var(--btc); }

  /* ── Status pill ────────────────────────────── */
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .status-pill.mining { background: #00d26a1a; color: var(--green); border: 1px solid #00d26a44; }
  .status-pill.stopped { background: #ff47571a; color: var(--red); border: 1px solid #ff475744; }
  .status-pill .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }
  .status-pill.mining .dot { animation: pulse 1.5s ease-in-out infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── Grid layout ────────────────────────────── */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid .full { grid-column: 1 / -1; }

  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; }
  }

  /* ── Cards ──────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    transition: border-color 0.3s;
  }
  .card:hover { border-color: var(--border-glow); }
  .card-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.4px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  /* ── Stat rows ──────────────────────────────── */
  .stat { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ffffff08; }
  .stat:last-child { border-bottom: none; }
  .stat .label { color: var(--text-dim); font-size: 12px; }
  .stat .value { font-size: 12px; font-weight: 500; text-align: right; word-break: break-all; }
  .stat .value.btc { color: var(--btc); }
  .stat .value.green { color: var(--green); }
  .stat .value.mono-sm { font-size: 11px; max-width: 280px; }

  /* ── Big number ─────────────────────────────── */
  .big-num {
    font-family: var(--sans);
    font-size: 42px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
  }
  .big-label { font-size: 11px; color: var(--text-dim); }

  /* ── Controls ───────────────────────────────── */
  .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

  button {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    padding: 10px 20px;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface2);
    color: var(--text);
  }
  button:hover { border-color: var(--btc); background: #f7931a11; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-start { border-color: var(--green); color: var(--green); }
  .btn-start:hover { background: #00d26a11; border-color: var(--green); }

  .btn-stop { border-color: var(--red); color: var(--red); }
  .btn-stop:hover { background: #ff475711; border-color: var(--red); }

  .btn-mine { border-color: var(--btc); color: var(--btc); }
  .btn-mine:hover { background: #f7931a11; }

  .btn-fast { border-color: var(--blue); color: var(--blue); }
  .btn-fast:hover { background: #4a9eff11; border-color: var(--blue); }

  /* ── Interval input ─────────────────────────── */
  .interval-group {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }
  .interval-group label { font-size: 11px; color: var(--text-dim); }
  .interval-group input {
    font-family: var(--mono);
    font-size: 13px;
    width: 60px;
    padding: 6px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    text-align: center;
  }
  .interval-group input:focus { outline: none; border-color: var(--btc); }
  .interval-group span { font-size: 11px; color: var(--text-dim); }

  /* ── Block list ─────────────────────────────── */
  .block-row {
    display: grid;
    grid-template-columns: 60px 1fr 100px 50px;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid #ffffff06;
    font-size: 12px;
    align-items: center;
  }
  .block-row:first-child { padding-top: 0; }
  .block-row .height { color: var(--btc); font-weight: 600; }
  .block-row .hash { color: var(--text-dim); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .block-row .time { color: var(--text-dim); font-size: 11px; text-align: right; }
  .block-row .txs { color: var(--text-dim); font-size: 11px; text-align: right; }

  /* ── Log ─────────────────────────────────────── */
  .log {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    max-height: 160px;
    overflow-y: auto;
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.7;
  }
  .log .entry-ok { color: var(--green); }
  .log .entry-err { color: var(--red); }

  /* ── Loading skeleton ───────────────────────── */
  .skeleton {
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
    height: 16px;
    width: 80px;
    display: inline-block;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* ── Toast ──────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    z-index: 999;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.ok { background: #00d26a22; border: 1px solid #00d26a66; color: var(--green); }
  .toast.err { background: #ff475722; border: 1px solid #ff475766; color: var(--red); }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <h1><span>&#x20bf;</span> Signet Control</h1>
    <div class="links">
      <a href="#" id="faucet-link" target="_blank">Faucet &rarr;</a>
      <a href="#" id="mempool-link" target="_blank">Mempool.space &rarr;</a>
    </div>
  </div>

  <div class="grid">

    <!-- Status + Controls -->
    <div class="card full">
      <div style="display:flex; align-items:center; gap:14px; margin-bottom:18px;">
        <div class="card-title" style="margin:0;">Miner</div>
        <div id="status-pill" class="status-pill stopped"><span class="dot"></span><span id="status-text">stopped</span></div>
      </div>
      <div class="controls">
        <button id="btn-start" class="btn-start" onclick="startMining()">&#9654; Auto-Mine (~10m)</button>
        <button id="btn-fast" class="btn-fast" onclick="startFastMining()">&#9889; Fast Mine (30s)</button>
        <button id="btn-stop" class="btn-stop" onclick="stopMining()" disabled>&#9632; Stop</button>
        <button id="btn-mine" class="btn-mine" onclick="mineOnce()">&#9881; Mine 1 Block</button>
      </div>
    </div>

    <!-- Block height -->
    <div class="card">
      <div class="card-title">Block Height</div>
      <div class="big-num" id="block-height">—</div>
      <div class="big-label" id="best-hash">waiting for node...</div>
    </div>

    <!-- Session stats -->
    <div class="card">
      <div class="card-title">Session Stats</div>
      <div class="stat"><span class="label">Blocks mined</span><span class="value btc" id="blocks-mined">0</span></div>
      <div class="stat"><span class="label">Miner balance</span><span class="value green" id="balance">—</span></div>
      <div class="stat"><span class="label">Difficulty</span><span class="value" id="difficulty">—</span></div>
      <div class="stat"><span class="label">Mempool</span><span class="value" id="mempool">—</span></div>
      <div class="stat"><span class="label">Peers</span><span class="value" id="peers">—</span></div>
    </div>

    <!-- Recent blocks -->
    <div class="card full">
      <div class="card-title">Recent Blocks</div>
      <div id="blocks-list" style="max-height:260px; overflow-y:auto;">
        <div style="color:var(--text-dim); font-size:12px;">Loading...</div>
      </div>
    </div>

    <!-- Activity log -->
    <div class="card full">
      <div class="card-title">Activity Log</div>
      <div id="log" class="log">
        <div>Connecting to miner controller...</div>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const API = '/api';
let polling = null;

// ── Helpers ────────────────────────────────────────────
function $(id) { return document.getElementById(id); }

function toast(msg, ok = true) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (ok ? 'ok' : 'err');
  setTimeout(() => t.className = 'toast', 2500);
}

function log(msg, ok = true) {
  const el = $('log');
  const ts = new Date().toLocaleTimeString();
  el.innerHTML += `<div class="entry-${ok ? 'ok' : 'err'}">[${ts}] ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

function truncHash(h) {
  if (!h || h.length < 20) return h || '—';
  return h.slice(0, 10) + '...' + h.slice(-8);
}

function timeAgo(ts) {
  if (!ts) return '—';
  const d = new Date(typeof ts === 'number' ? ts * 1000 : ts);
  const s = Math.floor((Date.now() - d.getTime()) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  return Math.floor(s / 3600) + 'h ago';
}

// ── API calls ──────────────────────────────────────────
async function fetchStatus() {
  try {
    const r = await fetch(API + '/status');
    const d = await r.json();
    updateUI(d);
  } catch (e) {
    /* node probably not ready yet */
  }
}

async function fetchBlocks() {
  try {
    const r = await fetch(API + '/recent-blocks?n=15');
    const d = await r.json();
    if (d.ok) renderBlocks(d.blocks);
  } catch (e) {}
}

async function fetchBalance() {
  try {
    const r = await fetch(API + '/balance');
    const d = await r.json();
    if (d.ok) $('balance').textContent = d.balance.toFixed(8) + ' BTC';
  } catch (e) {}
}

async function startMining() {
  const r = await fetch(API + '/start', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({})
  });
  const d = await r.json();
  toast(d.message, d.ok);
  log(d.message, d.ok);
  fetchStatus();
}

async function startFastMining() {
  const r = await fetch(API + '/start-fast', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ interval: 30 })
  });
  const d = await r.json();
  toast(d.message, d.ok);
  log(d.message, d.ok);
  fetchStatus();
}

async function stopMining() {
  const r = await fetch(API + '/stop', { method: 'POST' });
  const d = await r.json();
  toast(d.message, d.ok);
  log(d.message, d.ok);
  fetchStatus();
}

async function mineOnce() {
  $('btn-mine').disabled = true;
  $('btn-mine').textContent = '⏳ Mining...';
  try {
    const r = await fetch(API + '/mine-once', { method: 'POST' });
    const d = await r.json();
    if (d.ok) {
      toast(`Block #${d.block_height} mined`, true);
      log(`Mined block #${d.block_height} — ${truncHash(d.block_hash)}`, true);
    } else {
      toast(d.error || 'Failed', false);
      log(d.error || 'Mine failed', false);
    }
  } catch (e) {
    toast('Error: ' + e.message, false);
    log('Error: ' + e.message, false);
  }
  $('btn-mine').disabled = false;
  $('btn-mine').textContent = '⚙ Mine 1 Block';
  fetchStatus();
  fetchBlocks();
  fetchBalance();
}

// ── UI Update ──────────────────────────────────────────
function updateUI(d) {
  // Status pill
  const pill = $('status-pill');
  const stxt = $('status-text');
  if (d.running) {
    pill.className = 'status-pill mining';
    stxt.textContent = d.mode === 'fast' ? 'fast mining' : 'mining';
    $('btn-start').disabled = true;
    $('btn-fast').disabled = true;
    $('btn-stop').disabled = false;
  } else {
    pill.className = 'status-pill stopped';
    stxt.textContent = 'stopped';
    $('btn-start').disabled = false;
    $('btn-fast').disabled = false;
    $('btn-stop').disabled = true;
  }

  // Node info
  if (d.node && !d.node.error) {
    $('block-height').textContent = d.node.blocks ?? '—';
    $('best-hash').textContent = truncHash(d.node.bestblockhash);
    $('difficulty').textContent = d.node.difficulty ?? '—';
    $('mempool').textContent = (d.node.mempool_size ?? 0) + ' txs';
    $('peers').textContent = d.node.connections ?? 0;
  }

  // Miner stats
  $('blocks-mined').textContent = d.blocks_mined ?? 0;
}

function renderBlocks(blocks) {
  const el = $('blocks-list');
  if (!blocks.length) {
    el.innerHTML = '<div style="color:var(--text-dim);font-size:12px;">No blocks yet</div>';
    return;
  }
  el.innerHTML = blocks.map(b => `
    <div class="block-row">
      <span class="height">#${b.height}</span>
      <span class="hash" title="${b.hash}">${b.hash}</span>
      <span class="time">${timeAgo(b.time)}</span>
      <span class="txs">${b.nTx ?? '?'} tx</span>
    </div>
  `).join('');
}

// ── Polling loop ───────────────────────────────────────
// Set mempool link to same host on port 8080
$('mempool-link').href = window.location.protocol + '//' + window.location.hostname + ':8080';
$('faucet-link').href = window.location.protocol + '//' + window.location.hostname + ':3000';

function startPolling() {
  fetchStatus();
  fetchBlocks();
  fetchBalance();
  polling = setInterval(() => {
    fetchStatus();
    fetchBlocks();
    fetchBalance();
  }, 5000);
}

startPolling();
</script>

</body>
</html>
